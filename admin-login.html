<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login | SK Property Hub</title>

    <link rel="stylesheet" href="style.css">

    <style>

        .login-container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f8fafc;
        }

        .login-box{
            width:400px;
            background:#fff;
            padding:40px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,.1);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#0f172a;
        }

        .login-box input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            box-sizing:border-box;
        }

        .login-box button{
            width:100%;
            padding:14px;
            border:none;
            background:#2563eb;
            color:white;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .login-box button:hover{
            background:#1d4ed8;
        }

        .back-home{
            text-align:center;
            margin-top:15px;
        }

        .back-home a{
            text-decoration:none;
            color:#2563eb;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <div class="login-box">

            <h2>SK Property Hub Admin Login</h2>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Admin Email"
                    required>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                <button type="submit">
                    Login
                </button>

            </form>

            <div class="back-home">
                <a href="index.html">← Back To Website</a>
            </div>

        </div>

    </div>

    <script src="admin-login.js"></script>

</body>

</html>
